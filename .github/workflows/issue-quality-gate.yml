name: Issue Quality Gate

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue quality and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;
            const body = issue.body || '';
            const labels = issue.labels.map((l) => l.name);

            const requiredSectionsByLabel = {
              bug: [/###\s*Steps to reproduce/i, /###\s*Expected behavior/i, /###\s*Actual behavior/i],
              enhancement: [/###\s*Problem statement/i, /###\s*Proposed solution/i]
            };

            const requiredPatterns = [];
            for (const [label, patterns] of Object.entries(requiredSectionsByLabel)) {
              if (labels.includes(label)) {
                requiredPatterns.push(...patterns);
              }
            }

            const missing = requiredPatterns.filter((pattern) => !pattern.test(body));

            if (['opened', 'reopened'].includes(action) && !labels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
            }

            if (missing.length > 0) {
              if (!labels.includes('needs-information')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['needs-information']
                });
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });

              const marker = '<!-- issue-quality-gate -->';
              const alreadyCommented = comments.some((c) => c.body && c.body.includes(marker));

              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `${marker}\nThanks for opening this issue. Some required template sections appear to be missing. Please update the issue with all required details so maintainers can triage effectively.`
                });
              }
            } else if (labels.includes('needs-information')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'needs-information'
              }).catch(() => {});
            }
