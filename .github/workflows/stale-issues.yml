name: Stale Issues Cleanup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale issues
        uses: actions/stale@v9
        with:
          stale-issue-message: >-
            This issue has been automatically marked as stale due to inactivity.
            Please add an update/comment if this is still relevant.
          close-issue-message: >-
            Closing this issue due to prolonged inactivity.
            Please open a new issue if the problem persists.
          stale-issue-label: stale
          days-before-issue-stale: 30
          days-before-issue-close: 14
          exempt-issue-labels: pinned,security,keep-open
